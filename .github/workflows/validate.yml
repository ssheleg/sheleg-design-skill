name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate repo consistency
        run: python3 test/validate.py
      - name: CLI syntax check
        run: node --check bin/cli.js
      - name: CLI smoke test
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          node "$GITHUB_WORKSPACE/bin/cli.js" --claude
          test -s .claude/skills/sheleg-design/SKILL.md
          test -s .claude/skills/sheleg-design/SHELEG_DESIGN.md
